spring:
  application:
    name: server
  profiles:
    default: local
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

ai:
  server:
    url: ${AI_SERVER:}

kakao:
  rest-api-key: ${KAKAO_REST_API_KEY:}
  redirect-uri: ${KAKAO_REDIRECT_URI:}
  client-redirect-uri: ${KAKAO_CLIENT_REDIRECT_URI:}

jwt:
  secret: ${JWT_SECRET:}
  access-token-expiry: 1800000
  refresh-token-expiry: 604800000

upload:
  temp-dir: uploads/temp
  flowers-dir: uploads/flowers
  expiry-hours: 1
